<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Deany - Learn Islam Beautifully</title>

    <!-- PWA / installable app -->
    <meta name="theme-color" content="#22A39A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DEANY" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              deany: {
                white:       '#FFFFFF',
                cream:       '#FAF8F5',
                ivory:       '#F5F1EC',
                navy:        '#1A2332',
                steel:       '#4A5568',
                muted:       '#94a0b0',
                gold:        '#C9A84C',
                'gold-light':'#F5EDD4',
                sage:        '#7C9A82',
                'sage-light':'#EEF3EF',
                border:      '#E8E4DF',
                error:       '#C53030',
                'error-light':'#FEF2F2',
                'gold-tint': '#FFF8E7',
                // Bright palette
                'teal':       '#22A39A',
                'teal-dark':  '#1A8C82',
                'teal-deep':  '#0F4C5C',
                'teal-soft':  '#DCF3EF',
                'teal-pale':  '#7FD8CE',
                'br-gold':    '#F0B429',
                'gold-edge':  '#C8901A',
                'gold-soft':  '#FCEFCF',
                'gold-text':  '#5A3E00',
                'coral':      '#EF6F53',
                'coral-soft': '#FBE5DE',
                'blue':       '#2E6E8E',
                'blue-soft':  '#E0EDF7',
                'canvas':     '#FBFAF6',
                'hero-wash':  '#EAF7F5',
                'surface':    '#FFFFFF',
                'text':       '#173A4A',
                'text-deep':  '#0F4C5C',
                'text-muted': '#5E7480',
                'text-faint': '#94A3AA',
              },
            },
            fontFamily: {
              sans: ['"Source Sans 3"', 'system-ui', '-apple-system', 'sans-serif'],
              arabic: ['"Noto Naskh Arabic"', '"Traditional Arabic"', 'serif'],
            },
            boxShadow: {
              card:        '0 1px 2px rgba(26,35,50,.05), 0 8px 24px rgba(26,35,50,.08)',
              'card-raised': '0 4px 8px rgba(26,35,50,.08), 0 18px 44px rgba(26,35,50,.14)',
            },
            animation: {
              'pulse-gold': 'pulseGold 2s ease-in-out infinite',
            },
            keyframes: {
              pulseGold: {
                '0%, 100%': { boxShadow: '0 0 0 0 rgba(201, 168, 76, 0.4)' },
                '50%':      { boxShadow: '0 0 0 12px rgba(201, 168, 76, 0)' },
              },
            },
          },
        },
      }
    </script>
    <style>
      body { margin: 0; background: #FBFAF6; }
      #deany-shell { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 12px; }
      #deany-shell .logo { width: 36px; height: 36px; border-radius: 50%; background: #22A39A; display: flex; align-items: center; justify-content: center; color: #fff; font-family: Georgia, serif; font-size: 18px; }
      #deany-shell .name { font-family: Georgia, serif; font-size: 18px; color: #0F4C5C; font-weight: 500; }
      #deany-shell .dot { width: 6px; height: 6px; border-radius: 50%; background: #F0B429; animation: shellPulse 1.2s ease-in-out infinite; }
      @keyframes shellPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="deany-shell">
        <div class="logo">د</div>
        <div class="name">Deany</div>
        <div class="dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        var deanyRefreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (deanyRefreshing) return;
          deanyRefreshing = true;
          window.location.reload();
        });
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
            .then(function (reg) { reg.update(); })
            .catch(function () {});
        });
      }
    </script>
  </body>
</html>
